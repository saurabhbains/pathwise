services:
  # Backend API + WebSocket Server
  - type: web
    name: pathwise-api
    runtime: node
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health
